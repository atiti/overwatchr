name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      - name: Build release binaries
        run: swift build -c release
      - name: Package app and CLI
        run: |
          chmod +x scripts/build_app_bundle.sh install.sh scripts/smoke.sh
          VERSION="${GITHUB_REF_NAME#v}" CREATE_ARCHIVE=1 scripts/build_app_bundle.sh
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: overwatchr-release
          path: |
            dist/overwatchr-*-macos-app.zip
            dist/overwatchr-*-macos-cli.zip
            dist/Overwatchr.app
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/overwatchr-*-macos-app.zip
            dist/overwatchr-*-macos-cli.zip
