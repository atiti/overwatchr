name: Feature request
description: Suggest an improvement to Overwatchr
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or pain point are you trying to improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Overwatchr do instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Hook target, terminal, screenshots, related tools, or prior art
